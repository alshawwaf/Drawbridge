<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}DC Simulator{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.3" crossorigin="anonymous"></script>
  <style>
    :root {
      --bg:#f5f7fa; --surface:#fff; --line:#e4e8f0; --line-soft:#eef1f6;
      --navy:#1b2640; --text:#1a2233; --muted:#5b6678; --faint:#8b94a6;
      --accent:#e6007e; --accent-dark:#c70d72;
      --ok:#15935a; --ok-bg:#e6f5ec; --ok-line:#bfe6cd;
      --danger:#c0344d; --danger-bg:#fdecef; --danger-line:#f3c6d0;
      --r:8px; --r-lg:12px; --r-pill:20px;
      --shadow-sm:0 1px 2px rgba(16,24,40,.06);
      --shadow:0 1px 3px rgba(16,24,40,.09),0 1px 2px rgba(16,24,40,.05);
      --shadow-lg:0 14px 44px rgba(16,24,40,.18);
    }
    * { box-sizing:border-box; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; background:var(--bg); color:var(--text); font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }

    /* Header */
    header { background:var(--navy); color:#fff; height:58px; padding:0 24px; display:flex; align-items:center; gap:12px; }
    header .brand { font-weight:700; font-size:15px; letter-spacing:.2px; }
    header .tag { background:var(--accent); color:#fff; font-size:10px; font-weight:700; letter-spacing:.6px; padding:3px 8px; border-radius:var(--r-pill); text-transform:uppercase; }
    header nav { margin-left:auto; display:flex; align-items:center; gap:4px; }
    header nav a, header .menu-trigger { color:#c4ccdc; text-decoration:none; font-size:13.5px; padding:8px 12px; border-radius:7px; line-height:1; }
    header nav a:hover, header .menu-trigger:hover { color:#fff; background:rgba(255,255,255,.09); }

    /* Layout & type */
    main { max-width:1040px; margin:32px auto; padding:0 24px; }
    h1 { font-size:23px; font-weight:700; margin:0 0 4px; letter-spacing:-.2px; }
    h2 { font-size:15px; font-weight:650; margin:22px 0 10px; }
    .muted { color:var(--muted); font-size:13px; }

    /* Cards */
    .card { background:var(--surface); border:1px solid var(--line); border-radius:var(--r-lg); padding:22px; margin:16px 0; box-shadow:var(--shadow-sm); }
    a.card { display:block; color:inherit; text-decoration:none; transition:border-color .12s, box-shadow .12s, transform .12s; }
    a.card.choose:hover { border-color:var(--accent); box-shadow:var(--shadow); }

    /* Table */
    .tablewrap { overflow-x:auto; }
    table { width:100%; border-collapse:collapse; }
    thead th { text-align:left; padding:2px 16px 11px; color:var(--faint); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.6px; border-bottom:1px solid var(--line); white-space:nowrap; }
    tbody td { padding:14px 16px; border-bottom:1px solid var(--line-soft); vertical-align:middle; font-size:13.5px; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr { transition:background .1s; }
    tbody tr:hover { background:#fafbfd; }
    td.nowrap, th.nowrap { white-space:nowrap; }
    .feedname { color:var(--accent); font-weight:600; text-decoration:none; white-space:nowrap; }
    .feedname:hover { text-decoration:underline; }
    .subsel { color:var(--faint); font-size:11px; margin-top:4px; }

    /* Pills */
    .pill { display:inline-block; font-size:11px; font-weight:600; padding:3px 9px; border-radius:var(--r-pill); background:#eef1f6; color:#48536a; letter-spacing:.2px; }
    .pill.ok { background:var(--ok-bg); color:var(--ok); }
    .pill.faint { background:#f1f3f7; color:var(--faint); }

    /* Buttons */
    a.btn, button { font:inherit; font-size:13.5px; font-weight:600; border:none; border-radius:var(--r); padding:9px 16px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; gap:6px; line-height:1; background:var(--accent); color:#fff; transition:background .12s, border-color .12s, color .12s; }
    a.btn:hover, button:hover { background:var(--accent-dark); }
    a.btn.secondary, button.secondary { background:var(--surface); color:var(--text); border:1px solid var(--line); }
    a.btn.secondary:hover, button.secondary:hover { background:#f7f8fb; border-color:#d3d9e4; }
    a.btn.danger, button.danger { background:var(--surface); color:var(--danger); border:1px solid var(--danger-line); }
    a.btn.danger:hover, button.danger:hover { background:var(--danger-bg); }

    /* Forms */
    label { display:block; font-size:13px; font-weight:600; color:var(--text); margin:14px 0 6px; }
    input, textarea, select { width:100%; padding:9px 12px; border:1px solid var(--line); border-radius:var(--r); font-size:13.5px; font-family:inherit; color:var(--text); background:#fff; transition:border-color .12s, box-shadow .12s; }
    input:focus, textarea:focus, select:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(230,0,126,.12); }
    textarea { min-height:120px; font-family:ui-monospace,SFMono-Regular,Menlo,monospace; font-size:12.5px; line-height:1.55; resize:vertical; }

    /* Code */
    pre { background:#0f1626; color:#d6e2ff; padding:16px; border-radius:var(--r); overflow:auto; font-size:12.5px; line-height:1.6; }
    code { background:#eef1f6; color:#42506b; padding:1.5px 6px; border-radius:5px; font-size:12.5px; font-family:ui-monospace,monospace; }

    .err { background:var(--danger-bg); color:var(--danger); border:1px solid var(--danger-line); padding:11px 14px; border-radius:var(--r); font-size:13.5px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .grow { flex:1; }
    .copy { font-family:ui-monospace,monospace; font-size:13px; background:#f1f3f7; color:#33415c; border:1px solid var(--line); padding:10px 13px; border-radius:var(--r); word-break:break-all; }

    /* URL cell + copy */
    .urlcell { display:flex; align-items:center; gap:8px; max-width:300px; }
    .urltext { font-family:ui-monospace,monospace; font-size:12px; color:#48536a; background:#f1f3f7; border:1px solid var(--line); padding:7px 10px; border-radius:7px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
    .copybtn { background:#fff; color:var(--text); border:1px solid var(--line); border-radius:7px; padding:7px 12px; font-size:12.5px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .copybtn:hover { border-color:var(--accent); color:var(--accent); background:#fff; }
    .copybtn.copied { background:var(--ok-bg); color:var(--ok); border-color:var(--ok-line); }

    /* Filter chips */
    .filterbar { display:flex; gap:8px; margin:18px 0 0; flex-wrap:wrap; }
    .chip { background:var(--surface); color:var(--muted); border:1px solid var(--line); border-radius:var(--r-pill); padding:7px 14px; font-size:13px; font-weight:600; cursor:pointer; text-decoration:none; display:inline-block; }
    .chip:hover { border-color:#cfd6e2; color:var(--text); background:var(--surface); }
    .chip.active, .chip.active:hover { background:var(--navy); color:#fff; border-color:var(--navy); }
    .chipcount { opacity:.65; margin-left:5px; }

    /* Dropdown menu */
    .menu { position:relative; display:inline-block; }
    .menu-trigger { cursor:pointer; }
    .menu-items { position:absolute; top:calc(100% + 8px); right:0; background:var(--surface); border:1px solid var(--line); border-radius:10px; box-shadow:var(--shadow-lg); min-width:220px; overflow:hidden; z-index:500; display:none; padding:5px; }
    .menu.open .menu-items { display:block; }
    .menu-items a { display:block; padding:10px 12px; color:var(--text) !important; text-decoration:none; font-size:13.5px; border-radius:7px; }
    .menu-items a:hover { background:#f4f6fa; color:var(--text) !important; }

    /* Confirm modal */
    .modal-overlay { position:fixed; inset:0; background:rgba(16,22,38,.5); display:flex; align-items:center; justify-content:center; z-index:1000; }
    .modal-overlay[hidden] { display:none; }
    .modal { background:var(--surface); border-radius:14px; padding:24px; max-width:440px; width:90%; box-shadow:var(--shadow-lg); }
    .modal h3 { margin:0 0 8px; font-size:18px; font-weight:700; }
    .modal p { color:var(--muted); font-size:14px; margin:0; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:22px; }

    /* Toast (bottom-right, non-interactive) */
    .toast { position:fixed; bottom:20px; right:20px; background:var(--navy); color:#fff; padding:13px 18px; border-radius:10px; box-shadow:var(--shadow-lg); z-index:1100; font-size:14px; max-width:380px; pointer-events:none; transition:opacity .35s, transform .35s; }
    .toast.error { background:var(--danger); }
    .toast.hide { opacity:0; transform:translateY(10px); }
    /* Headings inside cards */
    h3 { font-size:13px; font-weight:650; margin:16px 0 8px; color:var(--text); }
    .pill.bad { background:var(--danger-bg); color:var(--danger); }
    /* Builder item rows + controls */
    .itemrow { display:flex; align-items:center; gap:8px; padding:9px 2px; border-bottom:1px solid var(--line-soft); font-size:13px; flex-wrap:wrap; }
    .itemrow:last-child { border-bottom:none; }
    .minibtn { margin-left:auto; background:#fff; color:var(--danger); border:1px solid var(--danger-line); border-radius:6px; padding:4px 11px; font-size:12px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .minibtn:hover { background:var(--danger-bg); }
    .err-inline { color:var(--danger); font-size:12.5px; margin-top:8px; }
    .row.endalign { align-items:flex-end; }
    .check { display:flex; align-items:center; gap:7px; }
    .check input { width:auto; }
    .check label { margin:0; }
    .modal.wide { max-width:560px; }
    .fp { font-family:ui-monospace,monospace; font-size:12px; background:#f1f3f7; border:1px solid var(--line); padding:8px 10px; border-radius:7px; word-break:break-all; }
    /* Progress stepper */
    .stepper { list-style:none; margin:16px 0 4px; padding:0; }
    .step { display:flex; align-items:center; gap:11px; padding:8px 0; color:var(--faint); font-size:14px; }
    .step .dot { width:20px; height:20px; border-radius:50%; border:2px solid var(--line); flex:none; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
    .step.active { color:var(--text); font-weight:600; }
    .step.active .dot { border-color:var(--accent); }
    .step.done { color:var(--text); }
    .step.done .dot { background:var(--ok); border-color:var(--ok); color:#fff; }
    .step.fail { color:var(--danger); font-weight:600; }
    .step.fail .dot { background:var(--danger); border-color:var(--danger); color:#fff; }
    .spin { width:14px; height:14px; border:2px solid var(--line); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
    @keyframes spin { to { transform:rotate(360deg); } }
    /* HTTP trace viewer */
    details > summary { cursor:pointer; font-weight:600; font-size:13px; color:var(--accent); padding:8px 0; list-style:none; }
    details > summary::-webkit-details-marker { display:none; }
    details > summary::before { content:"▸ "; }
    details[open] > summary::before { content:"▾ "; }
    .trace-step { border-top:1px solid var(--line-soft); padding:11px 0; }
    .trace-step:first-child { border-top:none; }
    .trace-head { display:flex; gap:8px; align-items:center; font-size:12.5px; margin-bottom:6px; flex-wrap:wrap; }
    .trace-lbl { color:var(--faint); font-size:11px; text-transform:uppercase; letter-spacing:.4px; margin:8px 0 3px; }
    .trace-step pre { margin:0; max-height:230px; font-size:11.5px; }
    fieldset { border:none; padding:0; margin:0; transition:opacity .15s; }
    fieldset:disabled { opacity:.5; }
    /* Pager (Activity log full history) */
    .pager { display:flex; align-items:center; gap:14px; padding:2px 0 14px; flex-wrap:wrap; }
    .pager .muted { font-size:12.5px; }
    button.secondary:disabled, button.secondary:disabled:hover { opacity:.45; cursor:default; background:var(--surface); color:var(--faint); border-color:var(--line); }
    /* Poll summary (feed page) */
    .pollstat { font-size:13px; margin:0 0 12px; color:var(--text); }
  </style>
</head>
<body>
  <header>
    <span class="brand">DC Integration Simulator</span>
    <span class="tag">PoV</span>
    {% block nav %}<nav>
      <a href="/">Feeds</a>
      <a href="/datacenters">Data Centers</a>
      <a href="/layers">Dynamic Layers</a>
      <a href="/gateways">Gateways</a>
      <a href="/activity">Activity</a>
      <div class="menu">
        <a href="#" class="menu-trigger">New ▾</a>
        <div class="menu-items">
          <a href="/feeds/new/generic-dc">Generic Data Center feed</a>
          <a href="/feeds/new/network-feed">Network Feed</a>
          <a href="/datacenters/new">OpenStack datacenter</a>
          <a href="/layers/new">Dynamic Layer</a>
        </div>
      </div>
      <a href="/logout">Sign out</a>
    </nav>{% endblock %}
  </header>
  <main>{% block content %}{% endblock %}</main>

  {% if flash %}
  <div id="toast" class="toast {{ flash.type }}">{{ flash.text }}</div>
  {% endif %}

  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal" role="dialog" aria-modal="true">
      <h3 id="modal-title">Please confirm</h3>
      <p id="modal-msg"></p>
      <div class="modal-actions">
        <button type="button" class="secondary" id="modal-cancel">Cancel</button>
        <button type="button" class="danger" id="modal-ok">Confirm</button>
      </div>
    </div>
  </div>

  <script>
    // Auto-dismiss + remove the toast (so it never overlaps the UI).
    (function () {
      var t = document.getElementById('toast');
      if (!t) return;
      setTimeout(function () { t.classList.add('hide'); }, 3500);
      setTimeout(function () { t.remove(); }, 4000);
    })();
    // In-app confirm modal (replaces native confirm()).
    (function () {
      var overlay = document.getElementById('modal-overlay');
      var msg = document.getElementById('modal-msg');
      var okBtn = document.getElementById('modal-ok');
      var cancelBtn = document.getElementById('modal-cancel');
      var pendingForm = null;
      function open(message, form) { msg.textContent = message; pendingForm = form; overlay.hidden = false; }
      function close() { overlay.hidden = true; pendingForm = null; }
      document.addEventListener('click', function (e) {
        var el = e.target.closest('[data-confirm]');
        if (!el) return;
        e.preventDefault();
        open(el.getAttribute('data-confirm'), el.closest('form'));
      });
      okBtn.addEventListener('click', function () { if (pendingForm) pendingForm.submit(); });
      cancelBtn.addEventListener('click', close);
      overlay.addEventListener('click', function (e) { if (e.target === overlay) close(); });
      document.addEventListener('keydown', function (e) { if (e.key === 'Escape' && !overlay.hidden) close(); });
    })();
    // Dropdown menus.
    (function () {
      document.addEventListener('click', function (e) {
        var trigger = e.target.closest('.menu-trigger');
        if (trigger) {
          e.preventDefault();
          var menu = trigger.closest('.menu');
          var wasOpen = menu.classList.contains('open');
          document.querySelectorAll('.menu.open').forEach(function (m) { m.classList.remove('open'); });
          if (!wasOpen) menu.classList.add('open');
          return;
        }
        document.querySelectorAll('.menu.open').forEach(function (m) { m.classList.remove('open'); });
      });
    })();
    // Copy-to-clipboard buttons (data-copy="text").
    (function () {
      document.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-copy]');
        if (!btn) return;
        e.preventDefault();
        var text = btn.getAttribute('data-copy');
        function done() {
          var label = btn.getAttribute('data-label') || btn.textContent;
          btn.setAttribute('data-label', label);
          btn.textContent = 'Copied!';
          btn.classList.add('copied');
          setTimeout(function () { btn.textContent = label; btn.classList.remove('copied'); }, 1500);
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done, done);
        } else {
          var ta = document.createElement('textarea');
          ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
          document.body.appendChild(ta); ta.select();
          try { document.execCommand('copy'); } catch (err) {}
          document.body.removeChild(ta); done();
        }
      });
    })();
  </script>
</body>
</html>
